<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ดีกันนะคะบี๋บี๋ 🥺</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Kanit', sans-serif;
            background: linear-gradient(-45deg, #ff9a9e, #fecfef, #ffdde1, #fcb69f);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
            overflow: hidden;
            touch-action: manipulation;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .card {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 30px;
            padding: 50px 30px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(255, 154, 158, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.8);
            width: 90%;
            max-width: 400px;
            z-index: 10;
        }
        .emoji {
            font-size: 80px;
            margin: 0 0 15px 0;
            display: inline-block;
            animation: heartbeat 1.5s infinite;
        }
        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }
        h1 {
            color: #ff6b81;
            font-weight: 600;
            font-size: 26px;
            margin: 0 0 10px 0;
        }
        p {
            color: #555;
            font-size: 16px;
            margin: 0 0 30px 0;
            line-height: 1.6;
        }
        .btn-group {
            display: flex;
            justify-content: center;
            gap: 15px;
            position: relative;
            height: 55px;
            transition: all 0.3s ease;
        }
        button {
            border: none;
            border-radius: 50px;
            font-family: 'Kanit', sans-serif;
            font-size: 18px;
            font-weight: 600;
            padding: 0 30px;
            height: 55px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
        }
        #btn-yes {
            background: #ff6b81;
            color: white;
            flex: 1; /* ปรับให้ขยายเท่ากัน */
            max-width: 150px;
        }
        #btn-yes:hover, #btn-yes:active {
            background: #ff4757;
            transform: scale(1.05);
        }
        #btn-no {
            background: #ffffff;
            color: #747d8c;
            flex: 1; /* ปรับให้ขยายเท่ากันและอยู่ข้างกันตอนเริ่มต้น */
            max-width: 150px;
            transition: top 0.3s ease, left 0.3s ease, opacity 0.3s ease, transform 0.3s ease;
            z-index: 100; /* ทำให้ปุ่มลอยอยู่บนสุดตอนวิ่งหนี */
        }

        /* เอฟเฟกต์กระพริบดึงดูดสายตา */
        @keyframes pulseAlert {
            0% { transform: scale(1); box-shadow: 0 8px 15px rgba(255, 107, 129, 0.4); }
            50% { transform: scale(1.15); box-shadow: 0 15px 30px rgba(255, 107, 129, 0.8); }
            100% { transform: scale(1); box-shadow: 0 8px 15px rgba(255, 107, 129, 0.4); }
        }
        .pulse-active {
            animation: pulseAlert 1.5s infinite !important;
            max-width: 200px !important;
            width: 100%;
        }
    </style>
</head>
<body>

<div class="card" id="main-card">
    <div class="emoji">🥺</div>
    <h1>ดีกันนะคะบี๋บี๋</h1>
    <p>เค้าผิดไปแล้วค่ะ เค้าขอโทษนะคะ<br>ดีกันนะคะบี๋บี๋ เกี่ยวก้อยๆ🤙</p>
    
    <div class="btn-group" id="btn-group">
        <button id="btn-yes" onclick="forgive()">ให้อภัย</button>
        <button id="btn-no">ไม่ให้อภัย</button>
    </div>
</div>

<script>
    const btnNo = document.getElementById("btn-no");
    const btnYes = document.getElementById("btn-yes");
    
    let escapeCount = 0;
    const maxEscapes = 15;

    function moveButton(e) {
        if(e) e.preventDefault(); 
        
        escapeCount++;

        if (escapeCount > maxEscapes) {
            btnNo.style.opacity = "0";
            btnNo.style.transform = "scale(0)";
            btnNo.style.pointerEvents = "none"; 
            
            setTimeout(() => {
                btnNo.style.display = "none";
                btnYes.classList.add("pulse-active");
            }, 300);
            
            return; 
        }
        
        const safePadding = 40; 
        const maxX = Math.max(safePadding, window.innerWidth - btnNo.offsetWidth - safePadding);
        const maxY = Math.max(safePadding, window.innerHeight - btnNo.offsetHeight - safePadding);

        const randomX = Math.floor(Math.random() * (maxX - safePadding + 1)) + safePadding;
        const randomY = Math.floor(Math.random() * (maxY - safePadding + 1)) + safePadding;

        // เมื่อโดนแตะครั้งแรก จะเปลี่ยนเป็น fixed เพื่อให้หลุดจากกรอบไปวิ่งหนีได้
        btnNo.style.position = "fixed";
        btnNo.style.left = `${randomX}px`;
        btnNo.style.top = `${randomY}px`;
    }

    btnNo.addEventListener("mouseover", moveButton);
    btnNo.addEventListener("touchstart", moveButton);

    function forgive() {
        const card = document.getElementById("main-card");
        card.innerHTML = `
            <div class="emoji" style="animation: none; transform: scale(1.2);">💖</div>
            <h1>เย้! รักจ้วนๆที่สุดเลย!</h1>
            <p>เดี๋ยวเค้าพาไปกินหนม ของอร่อยๆนะคะ จุ๊บๆๆๆ😚</p>
        `;
        
        shootConfetti();
    }

    function shootConfetti() {
        var duration = 3 * 1000;
        var animationEnd = Date.now() + duration;
        var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 100 };

        function randomInRange(min, max) {
            return Math.random() * (max - min) + min;
        }

        var interval = setInterval(function() {
            var timeLeft = animationEnd - Date.now();

            if (timeLeft <= 0) {
                return clearInterval(interval);
            }

            var particleCount = 50 * (timeLeft / duration);
            
            confetti(Object.assign({}, defaults, { 
                particleCount,
                origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 }
            }));
            confetti(Object.assign({}, defaults, { 
                particleCount,
                origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 }
            }));
        }, 250);
    }
</script>

</body>
</html>
